---
- name: Deploy Scientific Calculator Microservice
  hosts: local_host
  tasks:
    - name: Pull latest image from Docker Hub
      docker_image:
        name: "suchirokram/scientific_calculator"
        tag: latest
        source: pull

    - name: Stop and remove old container if it exists
      docker_container:
        name: calculator_service
        state: absent

    - name: Run the new Calculator container
      docker_container:
        name: calculator_service
        image: "suchirokram/scientific_calculator:latest"
        state: started
        interactive: yes
        tty: yes
        detach: yes
        restart_policy: unless-stopped

    - name: Get container info
      docker_container_info:
        name: calculator_service
        register: container_status

    - name: Display container status
      debug:
        var: container_status.container.State.Status
